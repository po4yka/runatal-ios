name: RunicQuotes
options:
  bundleIdPrefix: com.po4yka
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES

packages:
  Needle:
    url: https://github.com/uber/needle.git
    exactVersion: 0.25.1

targets:
  RunicQuotes:
    type: application
    platform: iOS
    preBuildScripts:
      - path: scripts/generate-needle.sh
        name: Generate Needle Graph
    sources:
      - path: RunicQuotes
        excludes:
          - "**/*.md"
    resources:
      - path: RunicQuotes/Resources/Assets.xcassets
      - path: RunicQuotes/Resources/Fonts
        buildPhase: resources
      - path: RunicQuotes/Resources/SeedData
        buildPhase: resources
      - path: RunicQuotes/Resources/Translation
        buildPhase: resources
      - path: RunicQuotes/Resources/LaunchScreen.storyboard
      - path: RunicQuotes/Resources/Localizations
        buildPhase: resources
    info:
      path: RunicQuotes/App/Info.plist
      properties:
        CFBundleDisplayName: Runic Quotes
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIAppFonts:
          - NotoSansRunic-Regular.ttf
          - BabelStoneRunic.ttf
          - CirthAngerthas.ttf
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UILaunchStoryboardName: LaunchScreen
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.po4yka.runicquotes
            CFBundleURLSchemes:
              - runicquotes
    entitlements:
      path: RunicQuotes/RunicQuotes.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.po4yka.runicquotes
    dependencies:
      - package: Needle
        product: NeedleFoundation
      - target: RunicQuotesWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.runicquotes
        INFOPLIST_FILE: RunicQuotes/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: RunicQuotes/RunicQuotes.entitlements

  RunicQuotesWidget:
    type: app-extension
    platform: iOS
    preBuildScripts:
      - path: scripts/generate-needle.sh
        name: Generate Needle Graph
    sources:
      - path: RunicQuotes/DI/Shared
        excludes:
          - "**/*.md"
      - path: RunicQuotesWidget
        excludes:
          - "**/*.md"
      - path: RunicQuotes/Models
        excludes:
          - "**/*.md"
      - path: RunicQuotes/Data
        excludes:
          - "**/*.md"
      - path: RunicQuotes/Utilities
        excludes:
          - "**/*.md"
    resources:
      - path: RunicQuotes/Resources/Fonts
        buildPhase: resources
      - path: RunicQuotes/Resources/SeedData
        buildPhase: resources
    info:
      path: RunicQuotesWidget/Info.plist
      properties:
        CFBundleDisplayName: Runic Quote
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - NotoSansRunic-Regular.ttf
          - BabelStoneRunic.ttf
          - CirthAngerthas.ttf
    entitlements:
      path: RunicQuotesWidget/RunicQuotesWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.po4yka.runicquotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.runicquotes.widget
        INFOPLIST_FILE: RunicQuotesWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: RunicQuotesWidget/RunicQuotesWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../../Frameworks"
    dependencies:
      - package: Needle
        product: NeedleFoundation

  RunicQuotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RunicQuotesTests
        excludes:
          - "**/*.md"
          - "**/Info.plist"
    dependencies:
      - target: RunicQuotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.runicquotes.tests
        GENERATE_INFOPLIST_FILE: true

  RunicQuotesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RunicQuotesUITests
        excludes:
          - "**/*.md"
          - "**/Info.plist"
    dependencies:
      - target: RunicQuotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.runicquotes.uitests
        GENERATE_INFOPLIST_FILE: true

  RunicQuotesWidgetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RunicQuotesWidgetTests
        excludes:
          - "**/*.md"
          - "**/Info.plist"
    dependencies:
      - target: RunicQuotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.runicquotes.widgettests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RunicQuotes.app/RunicQuotes"

schemes:
  RunicQuotes:
    build:
      targets:
        RunicQuotes: all
        RunicQuotesWidget: all
        RunicQuotesTests: [test]
        RunicQuotesUITests: [test]
        RunicQuotesWidgetTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RunicQuotesTests
        - RunicQuotesUITests
        - RunicQuotesWidgetTests
    profile:
      config: Release
    archive:
      config: Release
