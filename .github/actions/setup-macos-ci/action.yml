name: Setup macOS CI
description: Select the repo Xcode toolchain and optionally install Homebrew tools.

inputs:
  install-homebrew-tools:
    description: Install repo tooling from Brewfile when true.
    required: false
    default: "true"
  brewfile-path:
    description: Path to the repo Brewfile.
    required: false
    default: Brewfile

runs:
  using: composite
  steps:
    - name: Select Xcode 26.3
      shell: bash
      run: |
        set -euo pipefail
        XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
        if [ -z "$XCODE_APP" ]; then
          XCODE_APP=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
        fi
        sudo xcode-select -s "$XCODE_APP/Contents/Developer"
        xcodebuild -version

    - name: Install Homebrew tools
      if: ${{ inputs.install-homebrew-tools == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        export HOMEBREW_NO_AUTO_UPDATE=1
        brew bundle --file "${{ github.workspace }}/${{ inputs.brewfile-path }}" --no-lock
